<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vijdon Taxi | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; }
        .vijdon-bg { background: linear-gradient(135deg, #1e293b 0%, #020617 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-glow { box-shadow: 0 0 30px rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body class="text-white pb-10">

    <header class="vijdon-bg pt-12 pb-20 px-6 text-center rounded-b-[4rem] border-b-2 border-yellow-500/40">
        <div class="w-20 h-20 bg-yellow-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-2xl rotate-6">
            <i class="fa fa-taxi text-slate-900 text-4xl"></i>
        </div>
        <h1 class="text-4xl font-black tracking-tighter uppercase italic">VIJDON <span class="text-yellow-500 font-light text-3xl text-3xl">TAXI</span></h1>
        <p class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.5em] mt-2">Professional Xizmat</p>
    </header>

    <main class="max-w-md mx-auto px-6 -mt-14">
        <div class="glass rounded-[2.5rem] shadow-2xl p-8 relative z-10">
            
            <a href="tel:+998993390107" class="flex items-center justify-center gap-3 bg-yellow-500 text-slate-900 py-4 rounded-2xl mb-8 font-black shadow-xl active:scale-95 transition-all">
                <i class="fa fa-phone-alt animate-pulse"></i>
                99 339 01 07
            </a>

            <form id="vijdonForm" class="space-y-4">
                <div class="relative">
                    <i class="fa fa-user absolute left-4 top-1/2 -translate-y-1/2 text-yellow-500/60"></i>
                    <input type="text" id="userName" placeholder="Ism va Telefon" required 
                    class="w-full pl-11 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl focus:border-yellow-500 outline-none">
                </div>

                <div class="relative">
                    <i class="fa fa-map-marker-alt absolute left-4 top-1/2 -translate-y-1/2 text-yellow-500/60"></i>
                    <input type="text" id="userDest" placeholder="Manzil (Qayerga?)" required 
                    class="w-full pl-11 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl focus:border-yellow-500 outline-none">
                </div>

                <button type="button" onclick="getGPS()" id="gpsBtn" class="w-full py-4 bg-slate-800 border border-yellow-500/20 rounded-2xl font-bold flex items-center justify-center gap-3 text-xs text-slate-300">
                    <i class="fa fa-location-crosshairs text-yellow-500"></i>
                    <span id="gpsText">Aniq manzilni aniqlash</span>
                </button>

                <select id="userTarif" class="w-full p-4 bg-slate-800 border border-white/10 rounded-2xl font-bold text-yellow-500 outline-none appearance-none">
                    <option value="Ekonom - 140,000">🚕 Ekonom (140,000 so'm)</option>
                    <option value="Komfort - 180,000" selected>✨ Komfort (180,000 so'm)</option>
                    <option value="Biznes - 250,000">👑 Biznes (250,000 so'm)</option>
                </select>

                <button type="submit" id="submitBtn" class="w-full bg-yellow-500 text-slate-900 font-black py-5 rounded-[2rem] text-xl gold-glow active:scale-95 transition-all uppercase tracking-wider">
                    Safar boshlash
                </button>
            </form>
        </div>
    </main>

    <footer class="text-center py-10 opacity-30">
        <p class="text-[10px] font-black uppercase tracking-[0.5em]">Vijdon Taxi © 2026</p>
    </footer>

    <script>
        const BOT_TOKEN = "8795614569:AAFQXDCuV1DPa5QPBg5qP1rxLAKqkDqD0Jo";
        const CHAT_ID = "8514630685";
        let gpsData = "Aniqlanmadi";

        function getGPS() {
            const btn = document.getElementById('gpsBtn');
            const txt = document.getElementById('gpsText');
            if (navigator.geolocation) {
                txt.innerText = "Aniqlanmoqda...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    gpsData = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    txt.innerText = "Manzil aniqlandi ✅";
                    btn.classList.add('bg-green-700');
                }, () => { txt.innerText = "GPS xatosi!"; });
            }
        }

        document.getElementById('vijdonForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "YUBORILMOQDA...";
            btn.disabled = true;

            const name = document.getElementById('userName').value;
            const dest = document.getElementById('userDest').value;
            const tarif = document.getElementById('userTarif').value;

            const text = `🛡️ *VIJDON TAXI | YANGI ZAKAZ*\n\n👤 *Mijoz:* \`${name}\`\n📍 *Manzil:* ${dest}\n🏷️ *Tarif:* ${tarif}\n🗺️ *GPS:* [Xaritani ko'rish](${gpsData})`;

            const keyboard = {
                inline_keyboard: [
                    [
                        { text: "📞 Nomerni olish", url: `https://t.me/share/url?url=${encodeURIComponent(name)}` },
                        { text: "📍 Lokatsiya ochish", url: gpsData }
                    ]
                ]
            };

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: "Markdown",
                        reply_markup: keyboard
                    })
                });
                alert("✅ Buyurtmangiz qabul qilindi!");
                location.reload();
            } catch (err) {
                alert("❌ Xatolik!");
                btn.disabled = false;
                btn.innerText = "Safar boshlash";
            }
        };
    </script>
</body>
</html>
