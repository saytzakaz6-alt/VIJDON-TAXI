<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vijdon Taxi | Rasmiy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; }
        .vijdon-bg { background: linear-gradient(135deg, #1e293b 0%, #020617 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-glow { box-shadow: 0 0 30px rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body class="text-white pb-10">

    <header class="vijdon-bg pt-12 pb-20 px-6 text-center rounded-b-[4rem] border-b-2 border-yellow-500/40 shadow-2xl">
        <div class="w-20 h-20 bg-yellow-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-xl rotate-6">
            <i class="fa fa-taxi text-slate-900 text-4xl"></i>
        </div>
        <h1 class="text-4xl font-black tracking-tighter uppercase italic text-white">VIJDON <span class="text-yellow-500 font-light text-3xl">TAXI</span></h1>
        <p class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.6em] mt-2">Professional Xizmat</p>
    </header>

    <main class="max-w-md mx-auto px-6 -mt-14">
        <div class="glass rounded-[2.5rem] shadow-2xl p-8 relative z-10 border border-white/5">
            
            <a href="https://t.me/operator_vijdon" target="_blank" class="flex items-center justify-center gap-3 bg-sky-500 text-white py-4 rounded-2xl mb-8 font-black shadow-xl active:scale-95 transition-all">
                <i class="fab fa-telegram text-2xl"></i>
                OPERATORGA YOZISH
            </a>

            <form id="vijdonForm" class="space-y-4">
                <div class="relative">
                    <i class="fa fa-user absolute left-4 top-1/2 -translate-y-1/2 text-yellow-500/60"></i>
                    <input type="text" id="userName" placeholder="Ism va Telefon" required 
                    class="w-full pl-11 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl focus:border-yellow-500 outline-none transition-all text-white">
                </div>

                <div class="relative">
                    <i class="fa fa-map-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-yellow-500/60"></i>
                    <input type="text" id="userDest" placeholder="Qayerga borasiz?" required 
                    class="w-full pl-11 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl focus:border-yellow-500 outline-none transition-all text-white">
                </div>

                <button type="button" onclick="getGPS()" id="gpsBtn" class="w-full py-4 bg-slate-800 border border-yellow-500/20 rounded-2xl font-bold flex items-center justify-center gap-3 text-xs text-slate-300">
                    <i class="fa fa-location-arrow text-yellow-500"></i>
                    <span id="gpsText">Aniq manzilni aniqlash (GPS)</span>
                </button>

                <select id="userTarif" class="w-full p-4 bg-slate-800 border border-white/10 rounded-2xl font-bold text-yellow-500 outline-none appearance-none cursor-pointer">
                    <option value="Ekonom - 140,000">🚕 Ekonom (140,000 so'm)</option>
                    <option value="Komfort - 180,000" selected>✨ Komfort (180,000 so'm)</option>
                    <option value="Biznes - 250,000">👑 Biznes (250,000 so'm)</option>
                </select>

                <button type="submit" id="submitBtn" class="w-full bg-yellow-500 text-slate-900 font-black py-5 rounded-[2rem] text-xl gold-glow active:scale-95 transition-all uppercase tracking-wider">
                    Buyurtma berish
                </button>
            </form>
        </div>
    </main>

    <footer class="text-center py-10 opacity-20">
        <p class="text-[10px] font-black uppercase tracking-[0.5em]">Vijdon Taxi © 2026</p>
    </footer>

    <script>
        const BOT_TOKEN = "8795614569:AAFQXDCuV1DPa5QPBg5qP1rxLAKqkDqD0Jo";
        const RECIPIENTS = ["8514630685", "-1002962669521"];
        
        let gpsData = "GPS_aniqlanmadi";

        function getGPS() {
            const btn = document.getElementById('gpsBtn');
            if (navigator.geolocation) {
                document.getElementById('gpsText').innerText = "Aniqlanmoqda...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    gpsData = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    document.getElementById('gpsText').innerText = "Manzil aniqlandi ✅";
                    btn.classList.add('bg-green-700', 'text-white');
                });
            }
        }

        document.getElementById('vijdonForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "YUBORILMOQDA...";
            btn.disabled = true;

            const name = document.getElementById('userName').value;
            const dest = document.getElementById('userDest').value;
            const tarif = document.getElementById('userTarif').value;

            // Raqamni matndan ajratib olish (faqat raqamlar)
            const cleanPhone = name.replace(/\D/g, "");

            const text = `🛡️ *VIJDON TAXI | YANGI ZAKAZ*\n\n👤 *Mijoz:* \`${name}\`\n📍 *Manzil:* ${dest}\n🏷️ *Tarif:* ${tarif}`;

            const keyboard = {
                inline_keyboard: [
                    // Ustma-ust qilish uchun har bir tugma alohida [] qavs ichida bo'ladi
                    [{ text: "📞 Qo'ng'iroq qilish", url: `tel:+${cleanPhone}` }],
                    [{ text: "📍 Lokatsiya ochish", url: gpsData }]
                ]
            };

            try {
                for (const chatId of RECIPIENTS) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: text,
                            parse_mode: "Markdown",
                            reply_markup: keyboard
                        })
                    });
                }
                alert("✅ Buyurtmangiz qabul qilindi!");
                location.reload();
            } catch (err) {
                alert("❌ Xatolik yuz berdi!");
                btn.disabled = false;
                btn.innerText = "Buyurtma berish";
            }
        };
    </script>
</body>
</html>
